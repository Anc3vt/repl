log4j.logger.REPL=TRACE, replLog

# Stdout:
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.Target=System.out
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%d{HH:mm:ss} %-5p %c{1}: %m%n

log4j.appender.replLog=org.apache.log4j.RollingFileAppender
log4j.appender.replLog.File=log/repl-log.txt
log4j.appender.replLog.MaxFileSize=100MB
log4j.appender.replLog.MaxBackupIndex=10
log4j.appender.replLog.layout=org.apache.log4j.PatternLayout
log4j.appender.replLog.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}: %m%n

